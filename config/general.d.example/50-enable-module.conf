# =============================================================================
# GENERAL · MODULE MANAGEMENT
# =============================================================================
# Configuration for module and mod (third-party module) visibility and loading.
# These settings control which modules appear in the CLI menu and GUI.

# Global toggle for all mods (bundled third-party modules)
# Set to "false" to disable all mods. Individual mods can still be enabled
# via CFG_LH_MODULES_MODS_ENABLE_ONE when this is false.
# Default: "true"
CFG_LH_MODULES_MODS_ENABLE="true"

# Whitelist: Enable only specific mods when global toggle is off
# This setting is only effective when CFG_LH_MODULES_MODS_ENABLE="false"
# Specify space-separated list of mod IDs to enable
# Example: CFG_LH_MODULES_MODS_ENABLE_ONE="mod_custom_tool mod_extra_feature"
# Default: "" (empty - no individual mods enabled)
CFG_LH_MODULES_MODS_ENABLE_ONE=""

# Blacklist: Disable specific modules or mods (wins over other toggles)
# This setting overrides both CFG_LH_MODULES_MODS_ENABLE and 
# CFG_LH_MODULES_MODS_ENABLE_ONE. Use this to hide specific modules
# (including core modules) from the menu and registry.
# Specify space-separated list of module/mod IDs to disable
# Example: CFG_LH_MODULES_DISABLE_ONE="mod_experimental mod_deprecated mod_disk"
# Default: "" (empty - no modules disabled)
CFG_LH_MODULES_DISABLE_ONE=""
