# =============================================================================
# GENERAL · MODULE CATEGORY ORDERING
# =============================================================================
# Configuration for module category display order in CLI menu and GUI.
# Categories not listed here will appear after these, sorted alphabetically.
# Empty categories (with no modules) are automatically hidden.

# Category order: space-separated list of category IDs
# This defines the display order of module categories in menus.
# Categories from core modules and mods that are not listed here will
# be appended after these categories in alphabetical order.
#
# Default categories (in recommended order):
#   system       - System information and management
#   maintenance  - System maintenance and updates
#   security     - Security tools and checks
#   backup       - Backup and restore operations
#   network      - Network configuration and diagnostics
#   docker       - Docker management and security
#   logs         - Log viewing and analysis
#   energy       - Power management
#
# Example with custom order:
# CFG_LH_MODULE_CATEGORY_ORDER="system security backup maintenance network docker logs energy"
#
# Default: Standard order as shown above
CFG_LH_MODULE_CATEGORY_ORDER="system maintenance security backup network docker logs energy debug democase"

# Note: This setting only affects display order. Categories are still defined
# in module metadata files (modules/meta/_categories.json) with their names
# and translations. This config only controls the sequence in which they appear.
