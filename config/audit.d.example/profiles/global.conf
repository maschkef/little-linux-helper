# =============================================================================
# AUDIT PROFILE: Global Base
# =============================================================================
# @profile global
# @distro Universal Linux Base
#
# Universal packages found on almost all Linux distributions.
# This is the root of the inheritance hierarchy - other profiles source this.
#
# NOTE: This file should NOT be used directly. It is meant to be sourced
# by distribution-specific profiles (arch.conf, debian.conf, fedora.conf).

# EXACT MATCHES
# Universal tools present on virtually all Linux systems
CFG_AUDIT_BASE_PACKAGES_EXACT="bash,coreutils,openssh,nano,vim,man-db,man-pages,which,wget,curl,git,logrotate,usbutils,pciutils"

# PREFIX PATTERNS
# Universal package families (fonts, common libraries)
CFG_AUDIT_BASE_PACKAGES_PREFIX="ttf-,otf-,noto-fonts,adobe-source,font-"
