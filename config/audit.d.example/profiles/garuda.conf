# =============================================================================
# AUDIT PROFILE: Garuda Linux
# =============================================================================
# @profile garuda
# @distro Garuda Linux
# @parent arch
#
# Garuda-specific package detection patterns.
# Includes Garuda tools, Chaotic-AUR, and theming packages.
#
# Inheritance: global.conf -> arch.conf -> garuda.conf

# Source the Arch base configuration (which sources global.conf)
CONFIG_DIR="$(dirname "${BASH_SOURCE[0]}")"
source "$CONFIG_DIR/arch.conf"

# EXACT MATCHES
# Garuda-specific packages only (appended to arch)
CFG_AUDIT_BASE_PACKAGES_EXACT="${CFG_AUDIT_BASE_PACKAGES_EXACT},chaotic-keyring,chaotic-mirrorlist,garuda-update,garuda-hooks,garuda-common-settings,garuda-assistant,garuda-boot-options,garuda-welcome,garuda-settings-manager,garuda-wallpapers,garuda-icons,garuda-setup-assistant,garuda-network-assistant,garuda-gamer,garuda-dr460nized,garuda-hotfixes,rate-mirrors,reflector-simple"

# PREFIX PATTERNS
# Garuda-specific package families (appended to arch)
CFG_AUDIT_BASE_PACKAGES_PREFIX="${CFG_AUDIT_BASE_PACKAGES_PREFIX},garuda-,chaotic-,sweet-,kvantum,latte-"
