# =============================================================================
# AUDIT PROFILE: Arch Linux
# =============================================================================
# @profile arch
# @distro Arch Linux (vanilla)
# @parent global
#
# Base package detection patterns for standard Arch Linux installations.
# This profile covers the minimal base system packages.
#
# Inheritance: global.conf -> arch.conf

# Source the global base configuration
CONFIG_DIR="$(dirname "${BASH_SOURCE[0]}")"
source "$CONFIG_DIR/global.conf"

# EXACT MATCHES
# Arch-specific core system packages (appended to global)
CFG_AUDIT_BASE_PACKAGES_EXACT="${CFG_AUDIT_BASE_PACKAGES_EXACT},base,base-devel,linux,linux-firmware,linux-headers,linux-lts,linux-zen,filesystem,glibc,gcc-libs,zsh,util-linux,systemd,systemd-libs,dbus,shadow,sudo,pacman,pacman-contrib,archlinux-keyring,grub,efibootmgr,mkinitcpio,polkit,accountsservice,cryptsetup,device-mapper,lvm2,mdadm,iproute2,iputils,licenses,intel-ucode,amd-ucode,mhwd,mhwd-db,timeshift,snapper-support,grub-btrfs,btrfs-progs,btrfsmaintenance"

# PREFIX PATTERNS
# Arch-specific package families (appended to global)
CFG_AUDIT_BASE_PACKAGES_PREFIX="${CFG_AUDIT_BASE_PACKAGES_PREFIX},alsa-,pipewire,wireplumber,pulseaudio,jack-,gst-,gstreamer,xorg-,wayland,mesa,vulkan-,nvidia-,lib32-,lib,networkmanager,wpa_supplicant,iwd,dhcp,bluez,plasma-,kf5-,kf6-,qt5-,qt6-,kde-,kwayland,kscreen,powerdevil,sddm,archlinux-,python-systemd,python-gobject"
