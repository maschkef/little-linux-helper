# =============================================================================
# AUDIT · BASE PACKAGE DETECTION
# =============================================================================
# @group Package Audit
# @visibility basic
#
# Configure how the package audit identifies "base system" packages.
# These packages are flagged differently in the review process to help
# distinguish user-installed software from default system components.
#
# DETECTION MODE
# -----------------------------------------------------------------------------
# Controls which methods are used to identify base packages:
# - "both"    : Use time-based AND pattern-based detection (recommended)
# - "time"    : Only use install time window detection
# - "pattern" : Only use package name pattern matching
# - "none"    : Disable base package detection entirely
#
# Default: both
CFG_AUDIT_DETECTION_MODE="both"

# =============================================================================
# TIME-BASED DETECTION
# =============================================================================
# Packages installed within this time window (hours) from the very first
# package installation are considered part of the initial system setup.
#
# Set to 0 to disable time-based detection (even if mode includes "time")
# Default: 2 hours
CFG_AUDIT_BASE_INSTALL_HOURS="2"

# =============================================================================
# PATTERN-BASED DETECTION
# =============================================================================
# Packages matching these patterns are flagged as "base system" packages.
#
# EXACT MATCHES (comma-separated)
# Package names that exactly match these values are flagged as base.
# These are typically core system packages present on most installations.
CFG_AUDIT_BASE_PACKAGES_EXACT="base,base-devel,linux,linux-zen,linux-lts,linux-firmware,linux-headers,intel-ucode,amd-ucode,accountsservice,polkit,shadow,sudo,systemd,systemd-libs,dbus,grub,efibootmgr,os-prober,mkinitcpio,filesystem,glibc,gcc-libs,bash,zsh,coreutils,util-linux,pacman,pacman-contrib,archlinux-keyring,garuda-update,garuda-hooks,garuda-common-settings,garuda-assistant,nano,vim,git,wget,curl,man-db,man-pages,logrotate,usbutils,pciutils,which,licenses,device-mapper,cryptsetup,lvm2,mdadm,iproute2,iputils,openssh"
# PREFIX PATTERNS (comma-separated)
# Packages whose names START WITH these patterns are flagged as base.
# Do NOT include the trailing * - it's implied.
# Example: "alsa-" matches "alsa-utils", "alsa-plugins", etc.
CFG_AUDIT_BASE_PACKAGES_PREFIX="alsa-,pipewire,wireplumber,pulseaudio,jack-,gst-,gstreamer,ffmpeg,xorg-,wayland,mesa,vulkan-,nvidia-,lib32-,lib,ttf-,otf-,noto-fonts,adobe-source,font-,networkmanager,wpa_supplicant,iwd,dhcp,bluez,plasma-,kf5-,kf6-,qt5-,qt6-,kde-,kwayland,kscreen,powerdevil,sddm,archlinux-,garuda-,python-systemd,python-gobject"