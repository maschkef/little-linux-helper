# osxphotos backup module configuration

# Path to the Photos Library (mounted on Linux)
OSXPHOTOS_LIB=""

# Destination folder for exports and run history (defaults to $LH_STATE_DIR/osxphotos_backup)
OSXPHOTOS_DEST_DIR=""

# Templates used by osxphotos
OSXPHOTOS_DIRECTORY_TEMPLATE="{folder_album,NoAlbum}"
OSXPHOTOS_FILENAME_TEMPLATE="{original_name}"
OSXPHOTOS_KEYWORD_TEMPLATE="{folder_album(>)}"

# Menu defaults (1 = enabled / yes, 0 = disabled / no)
OSXPHOTOS_DEFAULT_UPDATE=1
OSXPHOTOS_DEFAULT_DRY_RUN=1
OSXPHOTOS_DEFAULT_USE_EXIFTOOL=1
OSXPHOTOS_DEFAULT_USE_SIDECAR=1
OSXPHOTOS_DEFAULT_SIDECAR_FORMAT="XMP"
OSXPHOTOS_DEFAULT_MERGE=1
OSXPHOTOS_DEFAULT_PERSON_KEYWORD=1
OSXPHOTOS_DEFAULT_TOUCH_FILE=1
OSXPHOTOS_DEFAULT_IGNORE_DATE_MODIFIED=1
OSXPHOTOS_DEFAULT_RETRY=3
